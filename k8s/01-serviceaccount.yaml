---
# Landmark Technology DevOps Demo - Kubernetes ServiceAccount
# ServiceAccounts provide identity for pods and control RBAC permissions
apiVersion: v1
kind: ServiceAccount
metadata:
  name: landmark-app
  namespace: landmark-devops
  labels:
    app: landmark
    component: application
  annotations:
    description: "Service account for Landmark DevOps application"

---
# Role for the application
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: landmark-app-role
  namespace: landmark-devops
  labels:
    app: landmark
rules:
  # Allow reading ConfigMaps and Secrets
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  # Allow reading Pods (for service discovery)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

---
# RoleBinding to attach Role to ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: landmark-app-rolebinding
  namespace: landmark-devops
  labels:
    app: landmark
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: landmark-app-role
subjects:
  - kind: ServiceAccount
    name: landmark-app
    namespace: landmark-devops
