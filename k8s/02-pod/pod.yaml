apiVersion: v1
kind: Pod
metadata:
  name: landmark-app-pod
  namespace: landmark-devops
  labels:
    app: landmark-app
spec:
  containers:
    - name: app
      image: landmark-devops:latest
      ports:
        - containerPort: 3000
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "256Mi"
          cpu: "500m"
      livenessProbe:
        httpGet:
          path: /
          port: 3000
        initialDelaySeconds: 30
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /
          port: 3000
        initialDelaySeconds: 10
        periodSeconds: 5
  restartPolicy: Always
