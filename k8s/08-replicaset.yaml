---
# Landmark Technology DevOps Demo - Kubernetes ReplicaSet
# ReplicaSets ensure a specified number of pod replicas are running
# Note: Typically managed by Deployments, shown here for educational purposes
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: landmark-app-rs
  namespace: landmark-devops
  labels:
    app: landmark
    component: application
    controller: replicaset
spec:
  replicas: 3
  
  selector:
    matchLabels:
      app: landmark
      component: application
      controller: replicaset
  
  template:
    metadata:
      labels:
        app: landmark
        component: application
        controller: replicaset
    
    spec:
      serviceAccountName: landmark-app
      
      containers:
        - name: app
          image: landmark-devops:latest
          imagePullPolicy: IfNotPresent
          
          ports:
            - name: http
              containerPort: 3000
          
          envFrom:
            - configMapRef:
                name: landmark-config
            - secretRef:
                name: landmark-secrets
          
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
      
      securityContext:
        fsGroup: 1001
      
      terminationGracePeriodSeconds: 30
