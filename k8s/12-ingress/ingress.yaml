apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: landmark-ingress
  namespace: landmark-devops
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
    - host: landmark-devops.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: landmark-app
                port:
                  number: 80

---
# Ingress with TLS (HTTPS)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: landmark-ingress-tls
  namespace: landmark-devops
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - landmark-devops.example.com
      secretName: landmark-tls-cert
  rules:
    - host: landmark-devops.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: landmark-app
                port:
                  number: 80
