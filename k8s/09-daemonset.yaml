---
# Landmark Technology DevOps Demo - Kubernetes DaemonSet
# DaemonSets ensure a pod runs on every node in the cluster
# Useful for monitoring, logging, and infrastructure tasks
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: landmark-monitor
  namespace: landmark-devops
  labels:
    app: landmark
    component: monitoring
spec:
  selector:
    matchLabels:
      app: landmark
      component: monitoring
  
  template:
    metadata:
      labels:
        app: landmark
        component: monitoring
    
    spec:
      # Tolerations for system nodes
      tolerations:
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
      
      # Node selector (optional)
      nodeSelector:
        kubernetes.io/os: linux
      
      containers:
        - name: monitor
          image: busybox:latest
          
          # Simple monitoring command
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                echo "Node: $(hostname)"
                echo "Timestamp: $(date)"
                echo "---"
                sleep 30
              done
          
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          
          securityContext:
            runAsNonRoot: false
            readOnlyRootFilesystem: true
      
      terminationGracePeriodSeconds: 10

---
# DaemonSet for node exporter (Prometheus metrics)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: landmark-node-exporter
  namespace: landmark-devops
  labels:
    app: landmark
    component: metrics
spec:
  selector:
    matchLabels:
      app: landmark
      component: metrics
  
  template:
    metadata:
      labels:
        app: landmark
        component: metrics
    
    spec:
      tolerations:
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
      
      hostNetwork: true
      hostPID: true
      
      containers:
        - name: node-exporter
          image: prom/node-exporter:latest
          
          ports:
            - name: metrics
              containerPort: 9100
              hostPort: 9100
          
          args:
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
          
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
          
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
      
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
      
      terminationGracePeriodSeconds: 30
