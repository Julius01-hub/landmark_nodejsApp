---
# Landmark Technology DevOps Demo - Kubernetes Deployment
# Deployments manage ReplicaSets and provide declarative updates
apiVersion: apps/v1
kind: Deployment
metadata:
  name: landmark-app
  namespace: landmark-devops
  labels:
    app: landmark
    component: application
  annotations:
    description: "Landmark DevOps Demo Application Deployment"
spec:
  # Number of replicas
  replicas: 3
  
  # Deployment strategy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  
  # Pod selector
  selector:
    matchLabels:
      app: landmark
      component: application
  
  # Pod template
  template:
    metadata:
      labels:
        app: landmark
        component: application
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
    
    spec:
      serviceAccountName: landmark-app
      
      # Init containers (run before main containers)
      initContainers:
        - name: wait-for-db
          image: busybox:latest
          command: ['sh', '-c', 'until nc -z landmark-mysql 3306; do echo waiting for db; sleep 2; done;']
      
      # Main containers
      containers:
        - name: app
          image: landmark-devops:latest
          imagePullPolicy: IfNotPresent
          
          # Container ports
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          
          # Environment variables
          envFrom:
            - configMapRef:
                name: landmark-config
            - secretRef:
                name: landmark-secrets
          
          # Additional environment variables
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          
          # Resource requests and limits
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          
          # Liveness probe
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Readiness probe
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          
          # Startup probe
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          
          # Volume mounts
          volumeMounts:
            - name: app-data
              mountPath: /app/data
          
          # Security context
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      
      # Pod-level security context
      securityContext:
        fsGroup: 1001
      
      # Volumes
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: landmark-app-pvc
      
      # Pod affinity and anti-affinity
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - landmark
                topologyKey: kubernetes.io/hostname
      
      # DNS policy
      dnsPolicy: ClusterFirst
      
      # Termination grace period
      terminationGracePeriodSeconds: 30

---
# Database Deployment (MySQL)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: landmark-mysql
  namespace: landmark-devops
  labels:
    app: landmark
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: landmark
      component: database
  
  template:
    metadata:
      labels:
        app: landmark
        component: database
    
    spec:
      containers:
        - name: mysql
          image: mysql:8.0-alpine
          
          ports:
            - name: mysql
              containerPort: 3306
          
          envFrom:
            - secretRef:
                name: landmark-secrets
          
          env:
            - name: MYSQL_DATABASE
              value: "landmark_devops"
          
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/mysql
            - name: db-config
              mountPath: /etc/mysql/conf.d
          
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
      
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: landmark-db-pvc
        - name: db-config
          configMap:
            name: landmark-db-config
      
      terminationGracePeriodSeconds: 30
