---
# Landmark Technology DevOps Demo - Kubernetes HorizontalPodAutoscaler
# HPA automatically scales the number of pods based on metrics
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: landmark-app-hpa
  namespace: landmark-devops
  labels:
    app: landmark
    component: application
spec:
  # Target the Deployment
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: landmark-app
  
  # Min and max replicas
  minReplicas: 2
  maxReplicas: 10
  
  # Scaling metrics
  metrics:
    # CPU-based scaling
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    
    # Memory-based scaling
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  
  # Scaling behavior
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
    
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max

---
# HPA for StatefulSet
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: landmark-app-stateful-hpa
  namespace: landmark-devops
  labels:
    app: landmark
    component: application
    variant: stateful
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: landmark-app-stateful
  
  minReplicas: 1
  maxReplicas: 5
  
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85
  
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
