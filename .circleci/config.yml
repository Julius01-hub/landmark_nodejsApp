version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:22.0
    steps:
      - checkout
      - run: npm install -g pnpm
      - run: pnpm install
      - run: pnpm build
      - run: pnpm test

  docker-build:
    docker:
      - image: cimg/base:2024.01
    steps:
      - checkout
      - setup_remote_docker
      - run: docker build -t landmark-devops:latest .

workflows:
  ci-cd:
    jobs:
      - build
      - docker-build:
          requires:
            - build
          filters:
            branches:
              only: main
